
[package]
name = "codex-utils-absolute-path"
version = "0.0.0"
edition = "2024"
license = "Apache-2.0"

publish = false
[dependencies]
dirs = { version = "=6.0.0" }
dunce = { version = "=1.0.5" }
schemars = { version = "=0.8.22" }
serde = { version = "=1.0.228", features = ["derive", "rc"] }
ts-rs = { version = "=11.1.0", features = [
    "serde-json-impl",
    "no-serde-warnings",
] }

[dev-dependencies]
pretty_assertions = { version = "=1.4.1" }
serde_json = { version = "=1.0.150" }
tempfile = { version = "=3.27.0" }

[lib]
doctest = false
