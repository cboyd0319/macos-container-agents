
[package]
name = "codex-utils-plugins"
version = "0.0.0"
edition = "2024"
license = "Apache-2.0"
publish = false

[lib]
doctest = false
name = "codex_utils_plugins"
path = "src/lib.rs"

[dependencies]
codex-exec-server = { path = "../../exec-server" }
codex-utils-absolute-path = { path = "../absolute-path" }
codex-utils-path-uri = { path = "../path-uri" }
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = { version = "=1.0.150" }

[dev-dependencies]
tempfile = { version = "=3.27.0" }
tokio = { version = "=1.52.3", features = ["macros", "rt"] }
