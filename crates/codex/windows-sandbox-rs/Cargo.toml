[package]
build = "build.rs"
name = "codex-windows-sandbox"
version = "0.0.0"
edition = "2024"
license = "Apache-2.0"
publish = false

[lib]
name = "codex_windows_sandbox"
path = "src/lib.rs"
doctest = false

[[bin]]
name = "codex-windows-sandbox-setup"
path = "src/bin/setup_main/main.rs"

[[bin]]
name = "codex-command-runner"
path = "src/bin/command_runner/main.rs"

[dependencies]
anyhow = { version = "=1.0.102" }
base64 = { version = "=0.22.1" }
chrono = { version = "=0.4.45", default-features = false, features = [
    "clock",
    "std",
] }
codex-otel = { path = "../otel" }
codex-utils-absolute-path = { path = "../utils/absolute-path" }
codex-utils-pty = { path = "../utils/pty" }
codex-utils-string = { path = "../utils/string" }
dunce = { version = "=1.0.5" }
glob = { version = "=0.3.3" }
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = { version = "=1.0.150" }
tempfile = { version = "=3.27.0" }
tokio = { version = "=1.52.3", features = ["sync", "rt", "macros", "signal", "time"] }
tracing-appender = { version = "=0.2.4" }
windows = { version = "=0.58.0", features = [
    "Win32_Foundation",
    "Win32_NetworkManagement_WindowsFirewall",
    "Win32_System_Com",
    "Win32_System_Variant",
] }

[dependencies.codex-protocol]
package = "codex-protocol"
path = "../protocol"

[dependencies.rand]
default-features = false
features = ["std", "small_rng"]
version = "=0.8.6"

[dependencies.dirs-next]
version = "=2.0.0"

[target.'cfg(windows)'.dependencies.windows-sys]
features = [
    "Win32_Foundation",
    "Win32_System_Diagnostics_Debug",
    "Win32_Security",
    "Win32_Security_Authorization",
    "Win32_System_Threading",
    "Win32_System_JobObjects",
    "Win32_System_SystemServices",
    "Win32_System_Environment",
    "Win32_System_Pipes",
    "Win32_System_WindowsProgramming",
    "Win32_System_IO",
    "Win32_System_Memory",
    "Win32_System_Kernel",
    "Win32_System_Console",
    "Win32_Storage_FileSystem",
    "Win32_System_Diagnostics_ToolHelp",
    "Win32_NetworkManagement_NetManagement",
    "Win32_NetworkManagement_WindowsFilteringPlatform",
    "Win32_Networking_WinSock",
    "Win32_System_LibraryLoader",
    "Win32_System_Com",
    "Win32_Security_Cryptography",
    "Win32_Security_Authentication_Identity",
    "Win32_System_Rpc",
    "Win32_Graphics_Gdi",
    "Win32_System_StationsAndDesktops",
    "Win32_UI_WindowsAndMessaging",
    "Win32_UI_Shell",
    "Win32_System_Registry",
]
version = "=0.52.0"

[dev-dependencies]
pretty_assertions = { version = "=1.4.1" }
